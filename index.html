<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FJ STRIKE: FINAL FIX - Radwan</title>
    <style>
        body { margin: 0; background: #87ceeb; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        .jet-card { padding: 15px; margin: 10px; background: #444; border: 2px solid #4efd54; width: 250px; border-radius: 10px; cursor: pointer; }
        #hud { position: absolute; top: 10px; left: 10px; color: #4efd54; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; z-index: 10; font-size: 14px; border: 1px solid #4efd54; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; }
        #fire-btn { background: rgba(255, 0, 0, 0.7); border-color: red; width: 90px; height: 90px; font-size: 18px; box-shadow: 0 0 15px red; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>FJ STRIKE: NATURE FIX</h1>
    <p>Pilot: Radwan-Islam-Alif</p>
    <div class="jet-card" onclick="startGame(0x555555)">LAUNCH F-22 RAPTOR</div>
    <div class="jet-card" onclick="startGame(0x333333)">LAUNCH SU-57 FELON</div>
</div>

<div id="hud">
    <b>PILOT: RADWAN</b><br>
    ALT: <span id="alt">0</span>m | BOSS HP: <span id="bossHealth">100</span>
</div>

<div id="controls" style="display:none;">
    <div class="btn" id="up-btn">UP</div>
    <div class="btn" id="fire-btn">FIRE</div>
    <div class="btn" id="down-btn">DOWN</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, playerJet, gameActive = false;
    let moveUp = false, moveDown = false, missiles = [];
    let boss, bossHP = 100;

    function startGame(jColor) {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
        initGame(jColor);
    }

    function initGame(jColor) {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // নীল আকাশ
        scene.fog = new THREE.Fog(0x87ceeb, 50, 500);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 50, 10);
        scene.add(light, new THREE.AmbientLight(0x707070));

        // --- পাহাড়ের পরিবেশ (Hills) ---
        for(let i=0; i<50; i++) {
            let h = 20 + Math.random()*40;
            let hillGeo = new THREE.ConeGeometry(20, h, 4);
            let hillMat = new THREE.MeshStandardMaterial({color: 0x228b22});
            let hill = new THREE.Mesh(hillGeo, hillMat);
            hill.position.set(Math.random()*600-300, h/2, -i*80);
            scene.add(hill);
        }

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 10000), new THREE.MeshStandardMaterial({color: 0x1a4a16}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // --- জেট মডেল ---
        playerJet = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.4, 3, 8), new THREE.MeshStandardMaterial({color: jColor}));
        body.rotation.x = Math.PI/2;
        const wings = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.05, 1), new THREE.MeshStandardMaterial({color: jColor}));
        playerJet.add(body, wings);
        playerJet.position.y = 30;
        scene.add(playerJet);

        // --- বস এনিমি ---
        boss = new THREE.Mesh(new THREE.BoxGeometry(15, 5, 20), new THREE.MeshStandardMaterial({color: 0xff0000}));
        boss.position.set(0, 40, -400);
        scene.add(boss);

        gameActive = true;
        animate();
    }

    // FIRE BUTTON FIX
    function shoot() {
        if(!gameActive) return;
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xff0000}));
        m.position.copy(playerJet.position);
        scene.add(m);
        missiles.push(m);
    }
    document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
    document.getElementById('fire-btn').addEventListener('click', shoot);

    document.getElementById('up-btn').ontouchstart = (e) => { e.preventDefault(); moveUp = true; };
    document.getElementById('up-btn').ontouchend = () => moveUp = false;
    document.getElementById('down-btn').ontouchstart = (e) => { e.preventDefault(); moveDown = true; };
    document.getElementById('down-btn').ontouchend = () => moveDown = false;

    function animate() {
        if(!gameActive) return;
        requestAnimationFrame(animate);

        playerJet.position.z -= 1.0; 
        if(moveUp) playerJet.position.y += 0.4;
        if(moveDown && playerJet.position.y > 5) playerJet.position.y -= 0.4;

        boss.position.z -= 0.9;

        missiles.forEach((m, i) => {
            m.position.z -= 5;
            if(m.position.distanceTo(boss.position) < 20) {
                bossHP -= 5;
                document.getElementById('bossHealth').innerText = bossHP;
                scene.remove(m); missiles.splice(i, 1);
                if(bossHP <= 0) { alert("VICTORY!"); location.reload(); }
            }
            if(m.position.z < playerJet.position.z - 500) { scene.remove(m); missiles.splice(i, 1); }
        });

        camera.position.set(playerJet.position.x, playerJet.position.y + 4, playerJet.position.z + 12);
        camera.lookAt(playerJet.position);
        document.getElementById('alt').innerText = Math.floor(playerJet.position.y * 10);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
