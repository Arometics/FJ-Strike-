<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FJ STRIKE: REAL WORLD - Radwan</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #overlay { position: absolute; width: 100%; height: 100%; background: linear-gradient(#1e3c72, #2a5298); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        .input-box { padding: 12px; margin: 10px; width: 250px; border: none; border-radius: 8px; text-align: center; font-family: 'Orbitron'; }
        .jet-card { padding: 15px; margin: 8px; background: rgba(255,255,255,0.2); border: 2px solid white; width: 280px; border-radius: 15px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .jet-card:hover { background: white; color: black; }
        #hud { position: absolute; top: 15px; left: 15px; color: #4efd54; display: none; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; z-index: 10; border: 1px solid rgba(255,255,255,0.3); }
        #controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-around; z-index: 20; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; -webkit-user-select: none; }
        #fire-btn { background: rgba(255, 0, 0, 0.6); border-color: #ff4d4d; width: 110px; height: 110px; font-size: 22px; color: white; box-shadow: 0 0 20px red; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 35px; margin: 0; letter-spacing: 5px;">FJ STRIKE: NATURE</h1>
    <p>Developed by <b>Radwan-Islam-Alif</b></p>
    <input type="text" id="playerName" placeholder="Enter Your Name" class="input-box">
    <div class="jet-card" onclick="startCombat(0x555555, 'F-22 RAPTOR')">🚀 F-22 RAPTOR (Stealth)</div>
    <div class="jet-card" onclick="startCombat(0x333333, 'SU-57 FELON')">🛡️ SU-57 FELON (Agile)</div>
    <p style="font-size: 10px; margin-top: 15px;">SELECT JET TO LAUNCH MISSION</p>
</div>

<div id="hud">
    <b id="pNameDisp">PILOT: RADWAN</b><br>
    ALT: <span id="alt">0</span>m | BOSS HP: <span id="bossHealth">100</span>
</div>

<div id="controls">
    <div class="btn" id="up-btn">UP</div>
    <div class="btn" id="fire-btn">FIRE</div>
    <div class="btn" id="down-btn">DOWN</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, playerJet, gameActive = false;
    let moveUp = false, moveDown = false, missiles = [];
    let boss, bossHP = 100;

    function startCombat(color, name) {
        if(!document.getElementById('playerName').value) { alert("Please enter your name!"); return; }
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        document.getElementById('pNameDisp').innerText = "PILOT: " + document.getElementById('playerName').value.toUpperCase();
        initWorld(color);
    }

    function initWorld(jColor) {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 
        scene.fog = new THREE.Fog(0x87ceeb, 20, 400);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1500);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(sun, new THREE.AmbientLight(0x707070));

        // --- Pahar & Nature ---
        for(let i=0; i<60; i++) {
            let hH = 20 + Math.random()*40;
            let hillGeo = new THREE.ConeGeometry(15 + Math.random()*15, hH, 6);
            let hillMat = new THREE.MeshStandardMaterial({color: 0x228b22}); // Forest Green
            let hill = new THREE.Mesh(hillGeo, hillMat);
            hill.position.set(Math.random()*600-300, hH/2, -i*60);
            scene.add(hill);
        }

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 10000), new THREE.MeshStandardMaterial({color: 0x1a4a16}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // --- Realistic Jet Model ---
        playerJet = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.4, 3, 8), new THREE.MeshStandardMaterial({color: jColor}));
        body.rotation.x = Math.PI/2;
        const wings = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.05, 1.2), new THREE.MeshStandardMaterial({color: jColor}));
        const tail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.6), new THREE.MeshStandardMaterial({color: jColor}));
        tail.position.set(0, 0.5, 1.2);
        playerJet.add(body, wings, tail);
        playerJet.position.y = 30;
        scene.add(playerJet);

        // --- Boss Enemy ---
        const bGeo = new THREE.BoxGeometry(15, 4, 25);
        const bMat = new THREE.MeshStandardMaterial({color: 0xff0000});
        boss = new THREE.Mesh(bGeo, bMat);
        boss.position.set(0, 35, -300);
        scene.add(boss);

        gameActive = true;
        animate();
    }

    // FIRE ACTION (Direct Touch Fix)
    const fBtn = document.getElementById('fire-btn');
    const shoot = () => {
        if(!gameActive) return;
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: 0xff0000}));
        m.position.copy(playerJet.position);
        scene.add(m);
        missiles.push(m);
    };
    fBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
    fBtn.addEventListener('mousedown', (e) => { e.preventDefault(); shoot(); });

    // Move Controls
    document.getElementById('up-btn').ontouchstart = (e) => { e.preventDefault(); moveUp = true; };
    document.getElementById('up-btn').ontouchend = () => moveUp = false;
    document.getElementById('down-btn').ontouchstart = (e) => { e.preventDefault(); moveDown = true; };
    document.getElementById('down-btn').ontouchend = () => moveDown = false;

    function animate() {
        if(!gameActive) return;
        requestAnimationFrame(animate);

        playerJet.position.z -= 0.9; 
        if(moveUp) playerJet.position.y += 0.35;
        if(moveDown && playerJet.position.y > 5) playerJet.position.y -= 0.35;

        boss.position.z -= 0.8; // Boss pichone thakbe

        missiles.forEach((m, i) => {
            m.position.z -= 6;
            if(m.position.distanceTo(boss.position) < 20) {
                bossHP -= 4;
                document.getElementById('bossHealth').innerText = bossHP;
                scene.remove(m); missiles.splice(i, 1);
                if(bossHP <= 0) { alert("VICTORY! BOSS DESTROYED!"); location.reload(); }
            }
            if(m.position.z < playerJet.position.z - 400) { scene.remove(m); missiles.splice(i, 1); }
        });

        camera.position.set(playerJet.position.x, playerJet.position.y + 3.5, playerJet.position.z + 12);
        camera.lookAt(playerJet.position);
        document.getElementById('alt').innerText = Math.floor(playerJet.position.y * 10);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
